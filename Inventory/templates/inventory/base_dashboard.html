{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WOE BETIDE Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>

<body>
  <header class="dashboard-header">
    <a href="{% url 'dashboard_home' %}" class="brand-link">WOE BETIDE</a>

    <nav class="dashboard-nav">
      <a href="{% url 'dashboard_home' %}">Dashboard</a>
      <a href="{% url 'sell_dashboard' %}">Sell</a>
      <a href="{% url 'inventory_list' %}">Inventory</a>

      {% if request.user.is_superuser %}
        <a href="{% url 'import_inventory' %}">Import</a>
      {% endif %}
    </nav>
  </header>

  {% if messages %}
    <section class="messages">
      {% for message in messages %}
        <div class="message {{ message.tags }}">
          {{ message }}
        </div>
      {% endfor %}
    </section>
  {% endif %}

  <main class="dashboard-main">
    {% block content %}
    {% endblock %}
  </main>
</body>
</html>
