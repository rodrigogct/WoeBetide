{% extends "inventory/base_dashboard.html" %}

{% block content %}

<h1 class="page-title">Import Excel</h1>

<div class="form-card">
  <p>Upload your WOE BETIDE Excel file. Django will import the INVENTORY sheet.</p>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-field">
      <label>Excel file</label>
      <input type="file" name="excel_file" accept=".xlsx,.xls" required>
    </div>

    <button type="submit">Import Excel</button>
  </form>
</div>

<br>

<a class="button" href="{% url 'dashboard_home' %}">Back to Dashboard</a>

{% endblock %}
