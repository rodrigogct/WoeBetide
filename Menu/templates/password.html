<!DOCTYPE html>
<html>
<head>
  <title>WOE BETIDE</title>
</head>
<body>
  <h1>WOE BETIDE</h1>

  <form method="post">
    {% csrf_token %}

    <input
      type="password"
      name="password"
      placeholder="Enter password"
      required
    >

    <button type="submit">Enter</button>
  </form>

  {% if error %}
    <p style="color: red;">{{ error }}</p>
  {% endif %}
</body>
</html>
