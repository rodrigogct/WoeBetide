<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>WOE BETIDE</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
    }

    .password-container {
      width: 100%;
      max-width: 380px;
      padding: 30px;
      text-align: center;
    }

    .password-container h1 {
      margin: 0 0 20px;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.14em;
    }

    .countdown-label {
      margin: 0 0 10px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #555555;
    }

    .countdown {
      margin-bottom: 35px;
      display: flex;
      justify-content: center;
      gap: 14px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .countdown span {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
      letter-spacing: 0.04em;
    }

    .password-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .password-input {
      width: 100%;
      height: 46px;
      padding: 0 15px;
      border: 1px solid #b8b8b8;
      border-radius: 0;
      background: transparent;
      color: #111111;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .password-input:focus {
      border-color: #111111;
    }

    .password-input::placeholder {
      color: #777777;
    }

    .password-button {
      width: 100%;
      height: 46px;
      border: 1px solid #111111;
      border-radius: 0;
      background-color: #111111;
      color: #ffffff;
      font-family: inherit;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .password-button:hover {
      background-color: transparent;
      color: #111111;
    }

    .password-error {
      margin-top: 18px;
      color: #9c1c1c;
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .password-container {
        padding: 24px;
      }

      .countdown {
        gap: 10px;
      }

      .countdown span {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="password-container">
    <h1>WOE BETIDE</h1>

    <p class="countdown-label">Next drop opens in</p>

    <div class="countdown" id="countdown">
      <div><span id="days">00</span>Days</div>
      <div><span id="hours">00</span>Hours</div>
      <div><span id="minutes">00</span>Min</div>
      <div><span id="seconds">00</span>Sec</div>
    </div>

    <form method="post" class="password-form">
      {% csrf_token %}

      <input
        class="password-input"
        type="password"
        name="password"
        placeholder="Enter password"
        autocomplete="current-password"
        required
      >

      <button class="password-button" type="submit">
        Enter
      </button>
    </form>

    {% if error %}
      <p class="password-error">{{ error }}</p>
    {% endif %}
  </main>

  <script>
    // Change this to your real drop date/time.
    // Format: YYYY-MM-DDTHH:MM:SS-06:00 for Mexico City time.
    const DROP_DATE = new Date("2026-07-19T20:00:00-06:00").getTime();

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const countdownEl = document.getElementById("countdown");

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = DROP_DATE - now;

      if (distance <= 0) {
        countdownEl.innerHTML = "DROP IS LIVE";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      daysEl.textContent = String(days).padStart(2, "0");
      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
