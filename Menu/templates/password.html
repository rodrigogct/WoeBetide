<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>WOE BETIDE</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
    }

    .password-container {
      width: 100%;
      max-width: 380px;
      padding: 30px;
      text-align: center;
    }

    .password-container h1 {
      margin: 0 0 35px;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.14em;
    }

    .password-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .password-input {
      width: 100%;
      height: 46px;
      padding: 0 15px;
      border: 1px solid #b8b8b8;
      border-radius: 0;
      background: transparent;
      color: #111111;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .password-input:focus {
      border-color: #111111;
    }

    .password-input::placeholder {
      color: #777777;
    }

    .password-button {
      width: 100%;
      height: 46px;
      border: 1px solid #111111;
      border-radius: 0;
      background-color: #111111;
      color: #ffffff;
      font-family: inherit;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        background-color 0.2s ease,
        color 0.2s ease;
    }

    .password-button:hover {
      background-color: transparent;
      color: #111111;
    }

    .password-error {
      margin-top: 18px;
      color: #9c1c1c;
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .password-container {
        padding: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="password-container">
    <h1>WOE BETIDE</h1>

    <form method="post" class="password-form">
      {% csrf_token %}

      <input
        class="password-input"
        type="password"
        name="password"
        placeholder="Enter password"
        autocomplete="current-password"
        required
      >

      <button class="password-button" type="submit">
        Enter
      </button>
    </form>

    {% if error %}
      <p class="password-error">{{ error }}</p>
    {% endif %}
  </main>
</body>
</html>
